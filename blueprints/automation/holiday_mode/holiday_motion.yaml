blueprint:
  name: Holiday Mode – Motion Alert & Blue Flash
  description: >
    Sends notification and flashes blue lights when motion
    is detected during Holiday Mode.
  domain: automation

  input:
    holiday_mode:
      name: Holiday Mode Switch
      selector:
        entity:
          domain: input_boolean

    motion_sensor:
      name: Motion Sensor
      selector:
        entity:
          domain: binary_sensor

    colour_lights:
      name: Colour Lights
      selector:
        entity:
          domain: light
          multiple: true

    notify_service:
      name: Notification Service (e.g. notify.mobile_app_phone)
      selector:
        text:

mode: queued
max: 5

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

condition:
  - condition: state
    entity_id: !input holiday_mode
    state: "on"

action:
  - service: notify.{{ notify_service }}
    data:
      title: "🚨 Motion Detected"
      message: "Motion detected while Holiday Mode is active"

  - service: light.turn_on
    target:
      entity_id: !input colour_lights
    data:
      color_name: blue

  - delay: "00:00:05"

  - service: light.turn_off
    target:
      entity_id: !input colour_lights
