blueprint:
  name: Holiday Mode – Night Lighting Simulation
  description: Random lighting at night when holiday mode is active
  domain: automation

  input:
    holiday_mode:
      name: Holiday Mode Switch
      selector:
        entity:
          domain: input_boolean

    evening_lights:
      name: Evening Lights
      selector:
        entity:
          domain: light
          multiple: true

    random_lights:
      name: Random Lights
      selector:
        entity:
          domain: light
          multiple: true

    min_random:
      name: Minimum Lights Per Cycle
      default: 1
      selector:
        number:
          min: 1
          max: 5

    max_random:
      name: Maximum Lights Per Cycle
      default: 3
      selector:
        number:
          min: 1
          max: 8

mode: restart

trigger:
  - platform: sun
    event: sunset
    id: sunset

  - platform: time_pattern
    minutes: "/10"
    id: random

condition:
  - condition: state
    entity_id: !input holiday_mode
    state: "on"

  - condition: sun
    after: sunset
    before: sunrise

action:
  - choose:

      # Evening lights
      - conditions:
          - condition: trigger
            id: sunset
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input evening_lights

      # Random lighting
      - conditions:
          - condition: trigger
            id: random
        sequence:
          - variables:
              lights: !input random_lights
              min_lights: !input min_random
              max_lights: !input max_random

          - variables:
              count: "{{ range(min_lights, max_lights + 1) | random }}"

          - repeat:
              count: "{{ count }}"
              sequence:
                - service: light.toggle
                  target:
                    entity_id: "{{ lights | random }}"
